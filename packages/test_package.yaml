      - service: script.turn_on
        target: { entity_id: script.test_pc_reset }
      - wait_template: "{{ is_state('script.test_pc_reset', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_06_distacco_cascata }
      - wait_template: "{{ is_state('script.test_pc_06_distacco_cascata', 'off') }}"
