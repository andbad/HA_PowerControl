################################################################
############# POWER CONTROL - PACKAGE DI TEST #################
################################################################
# Autore: andbad                                               #
# Scopo: simulare 5 carichi virtuali e verificare la logica   #
#        di distacco/riattivazione del custom component.      #
#                                                              #
# Prerequisiti:                                                #
#   - Custom component power_control installato e configurato  #
#     con i 5 carichi qui definiti                             #
#   - Soglia immediata:  4000W                                 #
#   - Soglia ritardata:  3300W                                 #
#   - Delay immediato:   10s                                   #
#   - Delay ritardato:   1 min                                 #
#   - Attesa tra stop:   5s                                    #
#   - Attesa tra start:  1 min                                 #
#   - Attesa prima start:1 min                                 #
#   - Carico 3: auto_restart=False (per test 4 e 10)          #
#                                                              #
# Installazione: copiare in /config/packages/test_pc.yaml     #
# Log: Settings → System → Logs, filtrare per "pc_test"       #
################################################################

################################################################
# INPUT_NUMBER — potenza simulata per ciascun carico
################################################################
input_number:
  test_pc_potenza_1:
    name: "[TEST PC] Potenza Carico 1"
    min: 0
    max: 5000
    step: 50
    unit_of_measurement: W

  test_pc_potenza_2:
    name: "[TEST PC] Potenza Carico 2"
    min: 0
    max: 5000
    step: 50
    unit_of_measurement: W

  test_pc_potenza_3:
    name: "[TEST PC] Potenza Carico 3"
    min: 0
    max: 5000
    step: 50
    unit_of_measurement: W

  test_pc_potenza_4:
    name: "[TEST PC] Potenza Carico 4"
    min: 0
    max: 5000
    step: 50
    unit_of_measurement: W

  test_pc_potenza_5:
    name: "[TEST PC] Potenza Carico 5"
    min: 0
    max: 5000
    step: 50
    unit_of_measurement: W

################################################################
# INPUT_BOOLEAN — switch virtuali dei carichi
################################################################
input_boolean:
  test_pc_switch_1:
    name: "[TEST PC] Switch Carico 1"
    icon: mdi:toggle-switch

  test_pc_switch_2:
    name: "[TEST PC] Switch Carico 2"
    icon: mdi:toggle-switch

  test_pc_switch_3:
    name: "[TEST PC] Switch Carico 3"
    icon: mdi:toggle-switch

  test_pc_switch_4:
    name: "[TEST PC] Switch Carico 4"
    icon: mdi:toggle-switch

  test_pc_switch_5:
    name: "[TEST PC] Switch Carico 5"
    icon: mdi:toggle-switch

################################################################
# TEMPLATE — sensori di potenza e switch virtuali
################################################################
template:
  - sensor:
    - name: test_pc_sensor_potenza_1
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      state: >
        {% if is_state('input_boolean.test_pc_switch_1', 'on') %}
          {{ states('input_number.test_pc_potenza_1') | int(0) }}
        {% else %}0{% endif %}

    - name: test_pc_sensor_potenza_2
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      state: >
        {% if is_state('input_boolean.test_pc_switch_2', 'on') %}
          {{ states('input_number.test_pc_potenza_2') | int(0) }}
        {% else %}0{% endif %}

    - name: test_pc_sensor_potenza_3
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      state: >
        {% if is_state('input_boolean.test_pc_switch_3', 'on') %}
          {{ states('input_number.test_pc_potenza_3') | int(0) }}
        {% else %}0{% endif %}

    - name: test_pc_sensor_potenza_4
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      state: >
        {% if is_state('input_boolean.test_pc_switch_4', 'on') %}
          {{ states('input_number.test_pc_potenza_4') | int(0) }}
        {% else %}0{% endif %}

    - name: test_pc_sensor_potenza_5
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      state: >
        {% if is_state('input_boolean.test_pc_switch_5', 'on') %}
          {{ states('input_number.test_pc_potenza_5') | int(0) }}
        {% else %}0{% endif %}

  - switch:
    - name: test_pc_switch_virtuale_1
      unique_id: test_pc_switch_virtuale_1
      state: "{{ is_state('input_boolean.test_pc_switch_1', 'on') }}"
      turn_on:
        service: input_boolean.turn_on
        target: { entity_id: input_boolean.test_pc_switch_1 }
      turn_off:
        service: input_boolean.turn_off
        target: { entity_id: input_boolean.test_pc_switch_1 }

    - name: test_pc_switch_virtuale_2
      unique_id: test_pc_switch_virtuale_2
      state: "{{ is_state('input_boolean.test_pc_switch_2', 'on') }}"
      turn_on:
        service: input_boolean.turn_on
        target: { entity_id: input_boolean.test_pc_switch_2 }
      turn_off:
        service: input_boolean.turn_off
        target: { entity_id: input_boolean.test_pc_switch_2 }

    - name: test_pc_switch_virtuale_3
      unique_id: test_pc_switch_virtuale_3
      state: "{{ is_state('input_boolean.test_pc_switch_3', 'on') }}"
      turn_on:
        service: input_boolean.turn_on
        target: { entity_id: input_boolean.test_pc_switch_3 }
      turn_off:
        service: input_boolean.turn_off
        target: { entity_id: input_boolean.test_pc_switch_3 }

    - name: test_pc_switch_virtuale_4
      unique_id: test_pc_switch_virtuale_4
      state: "{{ is_state('input_boolean.test_pc_switch_4', 'on') }}"
      turn_on:
        service: input_boolean.turn_on
        target: { entity_id: input_boolean.test_pc_switch_4 }
      turn_off:
        service: input_boolean.turn_off
        target: { entity_id: input_boolean.test_pc_switch_4 }

    - name: test_pc_switch_virtuale_5
      unique_id: test_pc_switch_virtuale_5
      state: "{{ is_state('input_boolean.test_pc_switch_5', 'on') }}"
      turn_on:
        service: input_boolean.turn_on
        target: { entity_id: input_boolean.test_pc_switch_5 }
      turn_off:
        service: input_boolean.turn_off
        target: { entity_id: input_boolean.test_pc_switch_5 }

################################################################
# SCRIPT
################################################################
script:

  ################################################################
  # RESET — stato neutro: tutti ON a 600W (totale 3000W < 3300W)
  ################################################################
  test_pc_reset:
    alias: "[TEST PC] Reset stato iniziale"
    mode: single
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id:
            - input_boolean.test_pc_switch_1
            - input_boolean.test_pc_switch_2
            - input_boolean.test_pc_switch_3
            - input_boolean.test_pc_switch_4
            - input_boolean.test_pc_switch_5
      - service: input_number.set_value
        data: { value: 600 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
            - input_number.test_pc_potenza_5
      # Attendo stabilizzazione coordinator (almeno un ciclo da 10s)
      - delay: { seconds: 15 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST PC] Reset completato — 5 carichi ON a 600W ciascuno (totale 3000W, sotto soglie)"

  ################################################################
  # TEST 1 — Distacco immediato
  # 4x800W + 1x1200W = 4400W > soglia imm 4000W
  # Atteso: carico 5 spento entro ~25s; carichi 1-4 rimangono on
  ################################################################
  test_pc_01_distacco_immediato:
    alias: "[TEST PC] Test 1 — Distacco immediato"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 1] INIZIO — 4x800W + 1x1200W = 4400W (soglia imm 4000W, delay 10s)"
      - service: input_number.set_value
        data: { value: 800 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
      - service: input_number.set_value
        data: { value: 1200 }
        target: { entity_id: input_number.test_pc_potenza_5 }
      # delay immediato (10s) + tempo reazione coordinator
      - delay: { seconds: 25 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 1] VERIFICA —
            Carico 5 off: {% if is_state('switch.test_pc_switch_virtuale_5','off') %}PASS{% else %}FAIL{% endif %} |
            Carichi 1-4 on: {% if is_state('switch.test_pc_switch_virtuale_1','on') and is_state('switch.test_pc_switch_virtuale_2','on') and is_state('switch.test_pc_switch_virtuale_3','on') and is_state('switch.test_pc_switch_virtuale_4','on') %}PASS{% else %}FAIL — spento un carico ad alta priorità{% endif %}

  ################################################################
  # TEST 2 — Distacco ritardato
  # 5x700W = 3500W > soglia rit 3300W, < soglia imm 4000W
  # Verifica intermedia a 30s: nessun distacco
  # Verifica finale a 80s: carico 5 spento
  ################################################################
  test_pc_02_distacco_ritardato:
    alias: "[TEST PC] Test 2 — Distacco ritardato"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 2] INIZIO — 5x700W = 3500W (soglia rit 3300W, delay 1 min)"
      - service: input_number.set_value
        data: { value: 700 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
            - input_number.test_pc_potenza_5
      - delay: { seconds: 30 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 2] VERIFICA INTERMEDIA (30s) —
            Carico 5 ancora on (distacco non prematuro): {% if is_state('switch.test_pc_switch_virtuale_5','on') %}PASS{% else %}FAIL — distacco prematuro{% endif %}
      - delay: { seconds: 50 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 2] VERIFICA FINALE (80s) —
            Carico 5 off: {% if is_state('switch.test_pc_switch_virtuale_5','off') %}PASS{% else %}FAIL — non spento dopo delay{% endif %}

  ################################################################
  # TEST 3 — Riattivazione automatica
  # Prerequisito: carico 5 sospeso (lasciato da test 2)
  # Abbasso carichi 1-4 a 500W → totale attivo 2000W
  # 2000W + 700W sospesi = 2700W < 3300W → headroom ok
  # Atteso: carico 5 riattivato dopo wait_before_start (1 min)
  ################################################################
  test_pc_03_riattivazione_automatica:
    alias: "[TEST PC] Test 3 — Riattivazione automatica"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 3] INIZIO — Carico 5 sospeso. Abbasso 1-4 a 500W. Attendo riattivazione (1 min)."
      - service: input_number.set_value
        data: { value: 500 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
      - delay: { minutes: 1, seconds: 20 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 3] VERIFICA —
            Carico 5 on: {% if is_state('switch.test_pc_switch_virtuale_5','on') %}PASS{% else %}FAIL — non riattivato{% endif %}

  ################################################################
  # TEST 4 — Auto-restart disabilitato
  # Prerequisito: carico 3 configurato con auto_restart=False
  # Supero soglia immediata → carichi 5, 4, 3 sospesi
  # Abbasso potenza → attendo riattivazione
  # Atteso: carichi 4 e 5 riattivati, carico 3 rimane off
  ################################################################
  test_pc_04_auto_restart_disabilitato:
    alias: "[TEST PC] Test 4 — Auto-restart disabilitato"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 4] INIZIO — Carico 3 auto_restart=False. 5x1400W=7000W. Attendo distacco cascata."
      - service: input_number.set_value
        data: { value: 1400 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
            - input_number.test_pc_potenza_5
      # Attendo distacco cascata su carichi 5, 4, 3 (10s delay + 3x5s tra stop + margine)
      - delay: { seconds: 60 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 4] VERIFICA DISTACCO —
            Carico 3 off: {% if is_state('switch.test_pc_switch_virtuale_3','off') %}PASS{% else %}FAIL{% endif %} |
            Carico 4 off: {% if is_state('switch.test_pc_switch_virtuale_4','off') %}PASS{% else %}FAIL{% endif %} |
            Carico 5 off: {% if is_state('switch.test_pc_switch_virtuale_5','off') %}PASS{% else %}FAIL{% endif %}
      # Abbasso sotto soglia
      - service: input_number.set_value
        data: { value: 400 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
      # Attendo riattivazione
      - delay: { minutes: 1, seconds: 20 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 4] VERIFICA RIATTIVAZIONE —
            Carico 3 off (auto_restart=False): {% if is_state('switch.test_pc_switch_virtuale_3','off') %}PASS{% else %}FAIL — riattivato erroneamente{% endif %} |
            Carico 4 on: {% if is_state('switch.test_pc_switch_virtuale_4','on') %}PASS{% else %}FAIL{% endif %} |
            Carico 5 on: {% if is_state('switch.test_pc_switch_virtuale_5','on') %}PASS{% else %}FAIL{% endif %}

  ################################################################
  # TEST 5 — Riaccensione manuale durante sospensione
  # Prerequisito: carico 5 sospeso
  # Riaccendo manualmente switch carico 5
  # Atteso: watchdog azzera suspended_power entro 15s
  ################################################################
  test_pc_05_riaccensione_manuale:
    alias: "[TEST PC] Test 5 — Riaccensione manuale"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 5] INIZIO — Riaccensione manuale carico 5 (prerequisito: sospeso). Attendo watchdog 15s."
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.test_pc_switch_5 }
      - delay: { seconds: 15 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 5] VERIFICA —
            Switch 5 on: {% if is_state('switch.test_pc_switch_virtuale_5','on') %}PASS{% else %}FAIL{% endif %} |
            Suspended carico 5 azzerata: {% set s = state_attr('sensor.power_control_potenza_attuale','load_4_suspended_w') | int(-1) %}{% if s == 0 %}PASS{% else %}FAIL (valore: {{ s }}W){% endif %}

  ################################################################
  # TEST 6 — Distacco a cascata
  # 5x1000W = 5000W > soglia imm 4000W
  # Spegnere carico 5 (1000W) → 4000W, ancora al limite
  # Spegnere carico 4 (1000W) → 3000W < 3300W → stop
  # Atteso: carichi 4 e 5 off; carichi 1-3 on
  ################################################################
  test_pc_06_distacco_cascata:
    alias: "[TEST PC] Test 6 — Distacco a cascata"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 6] INIZIO — 5x1000W=5000W. Atteso distacco cascata su carichi 5 e 4."
      - service: input_number.set_value
        data: { value: 1000 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
            - input_number.test_pc_potenza_5
      # 10s delay + 5s tra stop + secondo stop + margine
      - delay: { seconds: 50 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 6] VERIFICA —
            Carico 5 off: {% if is_state('switch.test_pc_switch_virtuale_5','off') %}PASS{% else %}FAIL{% endif %} |
            Carico 4 off: {% if is_state('switch.test_pc_switch_virtuale_4','off') %}PASS{% else %}FAIL{% endif %} |
            Carichi 1-3 on: {% if is_state('switch.test_pc_switch_virtuale_1','on') and is_state('switch.test_pc_switch_virtuale_2','on') and is_state('switch.test_pc_switch_virtuale_3','on') %}PASS{% else %}FAIL — spento più del necessario{% endif %}

  ################################################################
  # TEST 7 — Riattivazione parziale
  # Prerequisito: carichi 4 e 5 sospesi (da test 6), 1-3 a 1000W
  # Abbasso 1-3 a 600W → totale attivo 1800W
  # Headroom = 3300 - 1800 = 1500W
  # Carico 5: 1000W sospesi → 1800+1000=2800 < 3300 → riattivato
  # Carico 4: 1000W sospesi → 2800+1000=3800 > 3300 → non riattivato
  ################################################################
  test_pc_07_riattivazione_parziale:
    alias: "[TEST PC] Test 7 — Riattivazione parziale"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 7] INIZIO — Carichi 4+5 sospesi, abbasso 1-3 a 600W. Atteso: solo carico 5 riattivato."
      - service: input_number.set_value
        data: { value: 600 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
      - delay: { minutes: 1, seconds: 20 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 7] VERIFICA —
            Carico 5 on (headroom sufficiente): {% if is_state('switch.test_pc_switch_virtuale_5','on') %}PASS{% else %}FAIL{% endif %} |
            Carico 4 off (headroom insufficiente): {% if is_state('switch.test_pc_switch_virtuale_4','off') %}PASS{% else %}FAIL — riattivato erroneamente{% endif %}

  ################################################################
  # TEST 8 — Carico già spento al momento del distacco
  # Spengo manualmente carico 5 prima che scatti il distacco
  # Carichi 1-4 a 1100W → 4400W > soglia imm 4000W
  # Atteso: carico 4 spento (carico 5 ignorato perché già off)
  ################################################################
  test_pc_08_carico_gia_spento:
    alias: "[TEST PC] Test 8 — Carico già spento al distacco"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 8] INIZIO — Spengo manualmente carico 5, poi porto 1-4 a 1100W = 4400W."
      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.test_pc_switch_5 }
      - service: input_number.set_value
        data: { value: 0 }
        target: { entity_id: input_number.test_pc_potenza_5 }
      - service: input_number.set_value
        data: { value: 1100 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
      - delay: { seconds: 25 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 8] VERIFICA —
            Carico 4 off (distacco sul primo disponibile): {% if is_state('switch.test_pc_switch_virtuale_4','off') %}PASS{% else %}FAIL{% endif %} |
            Carico 5 off e suspended=0 (ignorato, già spento): {% if is_state('switch.test_pc_switch_virtuale_5','off') %}PASS{% else %}FAIL{% endif %}

  ################################################################
  # TEST 9 — Sforamento durante riattivazione
  # Prerequisito: carico 5 sospeso
  # Abbasso potenza sotto soglia → timer riattivazione parte
  # A metà timer (30s) alzo drasticamente carico 1 → sforamento
  # Atteso: riattivazione bloccata, carico 5 rimane sospeso
  ################################################################
  test_pc_09_sforamento_durante_riattivazione:
    alias: "[TEST PC] Test 9 — Sforamento durante riattivazione"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 9] INIZIO — Abbasso potenza, poi picco a metà timer riattivazione."
      - service: input_number.set_value
        data: { value: 500 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
      - delay: { seconds: 30 }
      - service: input_number.set_value
        data: { value: 3500 }
        target: { entity_id: input_number.test_pc_potenza_1 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 9] Picco inserito (carico 1 → 3500W). Il coordinator deve bloccare la riattivazione."
      - delay: { minutes: 1, seconds: 10 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 9] VERIFICA —
            Carico 5 off (riattivazione bloccata): {% if is_state('switch.test_pc_switch_virtuale_5','off') %}PASS{% else %}FAIL — riattivato nonostante il picco{% endif %}

  ################################################################
  # TEST 10 — Mix auto-restart, riaccensione manuale, automatica
  # Supero soglia → carichi 3, 4, 5 sospesi
  # Riaccendo manualmente carico 4 durante attesa
  # Abbasso potenza
  # Atteso:
  #   - Carico 3: off (auto_restart=False)
  #   - Carico 4: on (riacceso manuale, watchdog ha azzerato suspended)
  #   - Carico 5: on (riattivato automaticamente)
  ################################################################
  test_pc_10_mix_riattivazione:
    alias: "[TEST PC] Test 10 — Mix auto-restart, manuale, automatico"
    mode: single
    sequence:
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 10] INIZIO — 5x1100W=5500W. Cascata su carichi 5, 4, 3."
      - service: input_number.set_value
        data: { value: 1100 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_3
            - input_number.test_pc_potenza_4
            - input_number.test_pc_potenza_5
      - delay: { seconds: 60 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 10] VERIFICA DISTACCO —
            Carico 3 off: {% if is_state('switch.test_pc_switch_virtuale_3','off') %}PASS{% else %}FAIL{% endif %} |
            Carico 4 off: {% if is_state('switch.test_pc_switch_virtuale_4','off') %}PASS{% else %}FAIL{% endif %} |
            Carico 5 off: {% if is_state('switch.test_pc_switch_virtuale_5','off') %}PASS{% else %}FAIL{% endif %}
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.test_pc_switch_4 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "[TEST 10] Riacceso manualmente carico 4. Attendo watchdog (15s) poi abbasso potenza."
      - delay: { seconds: 15 }
      - service: input_number.set_value
        data: { value: 400 }
        target:
          entity_id:
            - input_number.test_pc_potenza_1
            - input_number.test_pc_potenza_2
            - input_number.test_pc_potenza_4
      - delay: { minutes: 1, seconds: 20 }
      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: >
            [TEST 10] VERIFICA FINALE —
            Carico 3 off (auto_restart=False): {% if is_state('switch.test_pc_switch_virtuale_3','off') %}PASS{% else %}FAIL — riattivato erroneamente{% endif %} |
            Carico 4 on (manuale + watchdog): {% if is_state('switch.test_pc_switch_virtuale_4','on') %}PASS{% else %}FAIL{% endif %} |
            Carico 5 on (auto-restart): {% if is_state('switch.test_pc_switch_virtuale_5','on') %}PASS{% else %}FAIL{% endif %}

