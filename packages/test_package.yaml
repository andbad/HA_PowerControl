      - wait_template: "{{ is_state('script.test_pc_17_no_restart_potenza_alta', 'off') }}"
        timeout: { minutes: 3 }

      - service: system_log.write
        data:
          logger: homeassistant.components.pc_test
          level: debug
          message: "========== [TEST PC] FINE SUITE — controlla i log per i risultati PASS/FAIL =========="
