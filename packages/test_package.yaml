      - service: script.turn_on
        target: { entity_id: script.test_pc_reset }
      - wait_template: "{{ is_state('script.test_pc_reset', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_08_carico_gia_spento }
      - wait_template: "{{ is_state('script.test_pc_08_carico_gia_spento', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_reset }
      - wait_template: "{{ is_state('script.test_pc_reset', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_09_sforamento_durante_riattivazione }
      - wait_template: "{{ is_state('script.test_pc_09_sforamento_durante_riattivazione', 'off') }}"
        timeout: { minutes: 5 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_reset }
      - wait_template: "{{ is_state('script.test_pc_reset', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_10_mix_riattivazione }
      - wait_template: "{{ is_state('script.test_pc_10_mix_riattivazione', 'off') }}"
        timeout: { minutes: 5 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_reset }
      - wait_template: "{{ is_state('script.test_pc_reset', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_11_pc_disabilitato }
      - wait_template: "{{ is_state('script.test_pc_11_pc_disabilitato', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_reset }
      - wait_template: "{{ is_state('script.test_pc_reset', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_12_force_stop }
      - wait_template: "{{ is_state('script.test_pc_12_force_stop', 'off') }}"
