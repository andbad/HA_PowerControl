      - service: script.turn_on
        target: { entity_id: script.test_pc_reset }
      - wait_template: "{{ is_state('script.test_pc_reset', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_14_reset_load }
      - wait_template: "{{ is_state('script.test_pc_14_reset_load', 'off') }}"
        timeout: { minutes: 2 }

      - service: script.turn_on
        target: { entity_id: script.test_pc_reset }
      - wait_template: "{{ is_state('script.test_pc_reset', 'off') }}"
