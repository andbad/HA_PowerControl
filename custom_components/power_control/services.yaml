enable:
  name: Abilita Power Control
  description: Abilita il controllo automatico dei carichi.

disable:
  name: Disabilita Power Control
  description: >-
    Disabilita il controllo automatico dei carichi e resetta
    tutte le potenze sospese. I carichi non vengono riaccesi automaticamente.

reset_load:
  name: Resetta carico sospeso
  description: >-
    Azzera la potenza sospesa di un singolo carico, rimuovendolo
    dalla lista di attesa per la riattivazione.
  fields:
    load_index:
      name: Indice carico
      description: >-
        Indice del carico da resettare (0 = massima priorità).
        Visibile come attributo load_index sul sensore del carico.
      required: true
      selector:
        number:
          min: 0
          max: 19
          mode: box

force_stop_load:
  name: Forza distacco carico
  description: >-
    Spegne immediatamente un carico specifico e salva la sua
    potenza come sospesa, come se fosse stato distaccato automaticamente.
  fields:
    load_index:
      name: Indice carico
      description: Indice del carico da distaccare (0 = massima priorità).
      required: true
      selector:
        number:
          min: 0
          max: 19
          mode: box

force_start_load:
  name: Forza riattivazione carico
  description: >-
    Riattiva immediatamente un carico specifico, ignorando
    i timer di attesa. Utile per test o emergenze.
  fields:
    load_index:
      name: Indice carico
      description: Indice del carico da riattivare (0 = massima priorità).
      required: true
      selector:
        number:
          min: 0
          max: 19
          mode: box
