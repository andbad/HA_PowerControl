# Power Control — Dashboard Lovelace
# ─────────────────────────────────────────────────────────────────────────────
# Come importare:
#   1. Impostazioni → Dashboard → Aggiungi dashboard → Dashboard vuoto
#   2. Apri la dashboard → menu ⋮ → Modifica dashboard → menu ⋮ → Modifica YAML grezzo
#   3. Incolla questo contenuto e salva.
#
# Nota: gli entity_id assumono che il nome istanza sia "Power Control"
# (default del config flow). Se hai usato un nome diverso, sostituisci
# "power_control" con la versione snake_case del tuo nome.
# ─────────────────────────────────────────────────────────────────────────────

title: Power Control
views:
  - title: Panoramica
    path: power-control
    icon: mdi:lightning-bolt-circle
    cards:

      # ── Stato sistema ──────────────────────────────────────────────────────
      - type: vertical-stack
        cards:

          - type: horizontal-stack
            cards:
              - type: tile
                entity: switch.power_control_attivo
                name: Power Control
                icon: mdi:car-cruise-control
                color: green

              - type: tile
                entity: sensor.power_control_potenza_attuale
                name: Potenza attuale
                icon: mdi:lightning-bolt

              - type: tile
                entity: sensor.power_control_potenza_sospesa
                name: Potenza sospesa
                icon: mdi:pause-circle-outline
                color: orange

          - type: gauge
            entity: sensor.power_control_potenza_attuale
            name: Carico impianto
            unit: W
            min: 0
            max: 6000
            needle: true
            segments:
              - from: 0
                color: "#28a745"
              - from: 2500
                color: "#ffc107"
              - from: 3000
                color: "#dc3545"

          - type: entities
            title: Soglie configurate
            show_header_toggle: false
            entities:
              - entity: sensor.power_control_soglia_distacco_immediato
                name: Soglia immediata
                icon: mdi:flash-alert
              - entity: sensor.power_control_soglia_distacco_ritardato
                name: Soglia ritardata
                icon: mdi:flash-outline

      # ── Grafico storico ────────────────────────────────────────────────────
      - type: history-graph
        title: Andamento potenza (ultima ora)
        hours_to_show: 1
        refresh_interval: 30
        entities:
          - entity: sensor.power_control_potenza_attuale
            name: Potenza attuale
          - entity: sensor.power_control_potenza_sospesa
            name: Potenza sospesa
          - entity: sensor.power_control_soglia_distacco_immediato
            name: Soglia immediata
          - entity: sensor.power_control_soglia_distacco_ritardato
            name: Soglia ritardata

      # ── Carichi gestiti ───────────────────────────────────────────────────
      # Per ogni carico trova l'entity_id esatto in:
      #   Impostazioni → Integrazioni → Power Control → Entità
      # Il pattern è: sensor.power_control_<nome_carico_snake>_potenza_sospesa

      - type: vertical-stack
        title: Carichi gestiti
        cards:

          - type: entities
            title: "Carico 1 — Alta priorità"
            show_header_toggle: false
            entities:
              - type: section
                label: Stato
              - entity: switch.shelly_carico_1
                name: Interruttore
                icon: mdi:power-socket-it
              - entity: sensor.power_control_carico_1_potenza_sospesa
                name: Potenza sospesa
                icon: mdi:pause-circle-outline
              - type: section
                label: Controllo
              - type: button
                name: Forza distacco
                icon: mdi:power-off
                tap_action:
                  action: call-service
                  service: power_control.force_stop_load
                  data:
                    load_index: 0
              - type: button
                name: Forza riattivazione
                icon: mdi:power-on
                tap_action:
                  action: call-service
                  service: power_control.force_start_load
                  data:
                    load_index: 0

          - type: entities
            title: "Carico 2"
            show_header_toggle: false
            entities:
              - type: section
                label: Stato
              - entity: switch.shelly_carico_2
                name: Interruttore
                icon: mdi:power-socket-it
              - entity: sensor.power_control_carico_2_potenza_sospesa
                name: Potenza sospesa
                icon: mdi:pause-circle-outline
              - type: section
                label: Controllo
              - type: button
                name: Forza distacco
                icon: mdi:power-off
                tap_action:
                  action: call-service
                  service: power_control.force_stop_load
                  data:
                    load_index: 1
              - type: button
                name: Forza riattivazione
                icon: mdi:power-on
                tap_action:
                  action: call-service
                  service: power_control.force_start_load
                  data:
                    load_index: 1

          - type: entities
            title: "Carico 3"
            show_header_toggle: false
            entities:
              - type: section
                label: Stato
              - entity: switch.shelly_carico_3
                name: Interruttore
                icon: mdi:power-socket-it
              - entity: sensor.power_control_carico_3_potenza_sospesa
                name: Potenza sospesa
                icon: mdi:pause-circle-outline
              - type: section
                label: Controllo
              - type: button
                name: Forza distacco
                icon: mdi:power-off
                tap_action:
                  action: call-service
                  service: power_control.force_stop_load
                  data:
                    load_index: 2
              - type: button
                name: Forza riattivazione
                icon: mdi:power-on
                tap_action:
                  action: call-service
                  service: power_control.force_start_load
                  data:
                    load_index: 2

          - type: entities
            title: "Carico 4"
            show_header_toggle: false
            entities:
              - type: section
                label: Stato
              - entity: switch.shelly_carico_4
                name: Interruttore
                icon: mdi:power-socket-it
              - entity: sensor.power_control_carico_4_potenza_sospesa
                name: Potenza sospesa
                icon: mdi:pause-circle-outline
              - type: section
                label: Controllo
              - type: button
                name: Forza distacco
                icon: mdi:power-off
                tap_action:
                  action: call-service
                  service: power_control.force_stop_load
                  data:
                    load_index: 3
              - type: button
                name: Forza riattivazione
                icon: mdi:power-on
                tap_action:
                  action: call-service
                  service: power_control.force_start_load
                  data:
                    load_index: 3

          - type: entities
            title: "Carico 5 — Bassa priorità"
            show_header_toggle: false
            entities:
              - type: section
                label: Stato
              - entity: switch.shelly_carico_5
                name: Interruttore
                icon: mdi:power-socket-it
              - entity: sensor.power_control_carico_5_potenza_sospesa
                name: Potenza sospesa
                icon: mdi:pause-circle-outline
              - type: section
                label: Controllo
              - type: button
                name: Forza distacco
                icon: mdi:power-off
                tap_action:
                  action: call-service
                  service: power_control.force_stop_load
                  data:
                    load_index: 4
              - type: button
                name: Forza riattivazione
                icon: mdi:power-on
                tap_action:
                  action: call-service
                  service: power_control.force_start_load
                  data:
                    load_index: 4

      # ── Azioni rapide ──────────────────────────────────────────────────────
      - type: entities
        title: Azioni rapide
        show_header_toggle: false
        entities:
          - type: button
            name: Abilita Power Control
            icon: mdi:check-circle-outline
            tap_action:
              action: call-service
              service: power_control.enable
          - type: button
            name: Disabilita Power Control
            icon: mdi:close-circle-outline
            tap_action:
              action: call-service
              service: power_control.disable
